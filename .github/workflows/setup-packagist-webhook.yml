name: Setup Packagist webhook

on:
  workflow_dispatch:

# One-time workflow. Run once from Actions UI after adding GH_PAT_WEBHOOKS
# to the Production environment (fine-grained PAT, scope: Webhooks: write).
# After the webhook is registered this workflow is no longer needed.

permissions: {}

jobs:
  register:
    name: Register Packagist GitHub webhook
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Check for existing webhook
        id: check
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_WEBHOOKS }}
        run: |
          EXISTING=$(gh api repos/rokke-php/contracts/hooks \
            --jq '[.[] | select(.config.url | startswith("https://packagist.org"))] | length')
          echo "existing=${EXISTING}" >> "$GITHUB_OUTPUT"

      - name: Register webhook
        if: steps.check.outputs.existing == '0'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_WEBHOOKS }}
          PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
          PACKAGIST_TOKEN: ${{ secrets.PACKAGIST_TOKEN }}
        run: |
          gh api repos/rokke-php/contracts/hooks -X POST \
            --field name=web \
            --field active=true \
            --field "config[url]=https://packagist.org/api/github?username=${PACKAGIST_USERNAME}&apiToken=${PACKAGIST_TOKEN}" \
            --field 'config[content_type]=json' \
            --field 'config[insecure_ssl]=0' \
            --field 'events[]=push'

          echo "Packagist webhook registered."

      - name: Already registered
        if: steps.check.outputs.existing != '0'
        run: echo "Packagist webhook already exists — nothing to do."
