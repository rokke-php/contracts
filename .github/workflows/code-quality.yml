name: Code Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  phpstan-sarif:
    name: PHPStan (SARIF)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/cache@v6
        with:
          path: vendor
          key: composer-quality-${{ hashFiles('composer.json') }}
          restore-keys: composer-quality-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist --optimize-autoloader

      - name: Run PHPStan (JSON output)
        run: |
          vendor/bin/phpstan analyse \
            --error-format=json \
            --no-progress \
            --memory-limit=2G \
            > /tmp/phpstan-output.json 2>&1 || true

      - name: Convert PHPStan JSON to SARIF
        run: |
          php -r "
            \$input  = json_decode(file_get_contents('/tmp/phpstan-output.json'), true);
            \$root   = getcwd() . '/';
            \$results = [];

            foreach (\$input['files'] ?? [] as \$file => \$data) {
              \$uri = str_starts_with(\$file, \$root)
                ? substr(\$file, strlen(\$root))
                : \$file;

              foreach (\$data['messages'] as \$msg) {
                \$results[] = [
                  'ruleId'   => 'phpstan/' . (\$msg['identifier'] ?? 'error'),
                  'level'    => 'warning',
                  'message'  => ['text' => \$msg['message']],
                  'locations' => [['physicalLocation' => [
                    'artifactLocation' => ['uri' => \$uri, 'uriBaseId' => '%SRCROOT%'],
                    'region'           => ['startLine' => max(1, (int)\$msg['line'])],
                  ]]],
                ];
              }
            }

            \$sarif = [
              'version' => '2.1.0',
              '\$schema' => 'https://json.schemastore.org/sarif-2.1.0.json',
              'runs' => [[
                'tool' => ['driver' => [
                  'name'           => 'PHPStan',
                  'version'        => 'latest',
                  'informationUri' => 'https://phpstan.org',
                  'rules'          => [],
                ]],
                'results' => \$results,
              ]],
            ];

            file_put_contents(
              '/tmp/phpstan.sarif',
              json_encode(\$sarif, JSON_PRETTY_PRINT | JSON_UNESCAPED_SLASHES)
            );
            echo 'SARIF: ' . count(\$results) . ' finding(s).' . PHP_EOL;
          "

      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: /tmp/phpstan.sarif
          category: code-quality
        if: always()
