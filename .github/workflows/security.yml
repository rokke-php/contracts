name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  composer-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/cache@v6
        with:
          path: vendor
          key: composer-audit-${{ hashFiles('composer.json') }}
          restore-keys: composer-audit-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist --optimize-autoloader

      - name: Run composer audit (JSON)
        run: composer audit --format=json --no-interaction > /tmp/audit.json 2>&1 || true

      - name: Convert audit output to SARIF
        run: |
          php -r "
            \$data     = json_decode(file_get_contents('/tmp/audit.json'), true);
            \$results  = [];

            foreach (\$data['advisories'] ?? [] as \$package => \$advisories) {
              foreach (\$advisories as \$advisory) {
                \$cve  = \$advisory['cve'] ?? \$advisory['advisoryId'] ?? 'unknown';
                \$link = \$advisory['link'] ?? '';
                \$text = \$advisory['title'] . ' (' . \$advisory['affectedVersions'] . ')';
                if (\$link) { \$text .= ' — ' . \$link; }

                \$results[] = [
                  'ruleId'   => \$cve,
                  'level'    => 'error',
                  'message'  => ['text' => \$text],
                  'locations' => [['physicalLocation' => [
                    'artifactLocation' => ['uri' => 'composer.json', 'uriBaseId' => '%SRCROOT%'],
                    'region'           => ['startLine' => 1],
                  ]]],
                  'properties' => ['tags' => ['security']],
                ];
              }
            }

            \$sarif = [
              'version' => '2.1.0',
              '\$schema' => 'https://json.schemastore.org/sarif-2.1.0.json',
              'runs' => [[
                'tool' => ['driver' => [
                  'name'           => 'composer audit',
                  'informationUri' => 'https://getcomposer.org/doc/06-config.md#audit',
                  'rules'          => [],
                ]],
                'results' => \$results,
              ]],
            ];

            file_put_contents(
              '/tmp/audit.sarif',
              json_encode(\$sarif, JSON_PRETTY_PRINT | JSON_UNESCAPED_SLASHES)
            );
            echo 'SARIF: ' . count(\$results) . ' advisory(ies).' . PHP_EOL;
          "

      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: /tmp/audit.sarif
          category: security
        if: always()
